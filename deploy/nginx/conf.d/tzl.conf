server {
  listen 80;
  server_name _;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $tzl_node_backend http://tzl_node:7001;
  set $tzl_admin_node_backend http://tzl_admin_node:7101;

  client_max_body_size 50m;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    proxy_pass $tzl_node_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /public/ {
    proxy_pass $tzl_node_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  location /admin_api/ {
    proxy_pass $tzl_admin_node_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location / {
    default_type text/html;
    return 200 '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>天之灵API服务</title><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f8fa;color:#1f2329}main{text-align:center}h1{margin:0;font-size:32px;font-weight:600}</style></head><body><main><h1>天之灵API服务</h1></main></body></html>';
  }
}
