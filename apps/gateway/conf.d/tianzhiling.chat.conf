server {
  listen 80;
  server_name tianzhiling.chat www.tianzhiling.chat;

  include /etc/nginx/includes/health.conf;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name tianzhiling.chat www.tianzhiling.chat;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $tzl_node_backend http://tzl_node:7001;

  include /etc/nginx/includes/ssl-tianzhiling-chat.conf;

  client_max_body_size 50m;

  include /etc/nginx/includes/health.conf;

  location /api/ {
    proxy_pass $tzl_node_backend;
    include /etc/nginx/includes/proxy-headers.conf;
    include /etc/nginx/includes/proxy-timeouts.conf;
    proxy_buffering off;
  }

  location /public/ {
    proxy_pass $tzl_node_backend;
    include /etc/nginx/includes/proxy-headers.conf;
    include /etc/nginx/includes/proxy-timeouts.conf;
  }

  location / {
    return 404;
  }
}
