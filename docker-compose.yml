  #     - tzl_mongo
  #   networks:
  #     - tzl-network
  #   restart: always

  tzl_redis:
    container_name: tzl_redis
    image: redis:latest
    privileged: true
    sysctls:
      net.core.somaxconn: 1024
    ports:
      - 17380:6379
    volumes:
      - redis_data:/data
    networks:
      - tzl-network
    restart: always

  tzl_mongo:
    container_name: tzl_mongo
    image: mongo:6
    privileged: true
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=qwerasdf
    ports:
      - 17271:27017
    volumes:
      # - tzl_mongo_data:/data/db
      # - tzl_mongo_logs:/var/log/mongodb
      # - tzl_mongo_config:/data/configdb
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mongo:/data
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mongo/log:/var/log/mongodb
    networks:
      - tzl-network
    restart: always
    command: ["--wiredTigerCacheSizeGB", "1"]
    ulimits:
      nproc: 64000
      nofile:
        soft: 64000
        hard: 64000

  # mongo-express:
  #   image: mongo-express
  #   container_name: mongo-express
  #   ports:
  #     - 8081:8081
  #   environment:
  #     ME_CONFIG_OPTIONS_EDITORTHEME: 3024-night
  #     ME_CONFIG_MONGODB_SERVER: mongo
  #     ME_CONFIG_MONGODB_ADMINUSERNAME: admin
  #     ME_CONFIG_MONGODB_ADMINPASSWORD: qwerasdf
  #     ME_CONFIG_MONGODB_PORT: 27017
  #     ME_CONFIG_BASICAUTH_USERNAME: admin
  #     ME_CONFIG_BASICAUTH_PASSWORD: admin
  #   networks:
  #     - tzl-network
  #   depends_on:
  #     - tzl_mongo


  etcd:
    container_name: tzl-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    networks:
      - tzl-network
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - 17239:2379

  minio:
    container_name: tzl_minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "17902:9002"
      - "17900:9000"
    networks:
      - tzl-network
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: tzl-milvus-standalone
    image: milvusdb/milvus:v2.6.7
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "17953:19530"
      - "19091:9091"
    networks:
      - tzl-network
    depends_on:
      - "etcd"
      - "minio"



volumes:
  redis_data:
    driver: local
  tzl_mongo_data:
    driver: local
  tzl_mongo_config:
    driver: local
  tzl_mongo_logs:
    driver: local

networks:
  tzl-network:
    driver: bridge
    name: tzl-network
