  #     - pms
  #   networks:
  #     - tzl-network

  # pms:
  #   profiles: ["prod"]  # 这个配置表示该服务只在运行 docker-compose --profile prod up 命令时才会启动，用于区分开发和生产环境
  #   container_name: pms
